name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Run Tests ───────────────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Create .env.test
        working-directory: backend
        run: |
          cat <<EOF > .env.test
          NODE_ENV=test
          PORT=5001
          MONGO_URI=mongodb://localhost:27017/ingpo_test
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ─── Job 2: Deploy to Render ────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test                        # only runs if test job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: Production            # pulls secrets from your Production environment

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -o response.json -w "%{http_code}" \
            --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Content-Type: application/json" \
            --data '{}' > http_code.txt

          HTTP_CODE=$(cat http_code.txt)
          echo "Render API response: $(cat response.json)"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Deploy trigger failed with status $HTTP_CODE"
            exit 1
          fi

          echo "✅ Deploy triggered successfully"