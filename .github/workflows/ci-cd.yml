name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Build & Validate ─────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --include=dev

      - name: Check for missing imports / bad paths
        working-directory: backend
        run: |
          node --experimental-vm-modules --input-type=module <<< "import './src/app.js'" 2>&1
          if [ $? -ne 0 ]; then
            echo "❌ Import resolution failed — check for missing files, wrong casing, or missing .js extensions"
            exit 1
          fi
          echo "✅ All imports resolved successfully"

      - name: Check for circular dependencies
        working-directory: backend
        run: npx madge --circular --extensions js src/

  # ─── Job 2: Run Tests ────────────────────────────────────────────────────────
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    environment: Production
    needs: build

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --include=dev

      - name: Create .env.test
        working-directory: backend
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          PORT=5001
          MONGO_URI=mongodb://localhost:27017/jobboard_test
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          REDIS_HOST=localhost
          REDIS_PORT=6379
          EOF

      - name: Run tests
        working-directory: backend
        run: npm test -- --detectOpenHandles --forceExit

  # ─── Job 3: Deploy to Render ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: Production

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -o response.json -w "%{http_code}" \
            --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Content-Type: application/json" \
            --data '{}' > http_code.txt

          HTTP_CODE=$(cat http_code.txt)
          echo "Render API response: $(cat response.json)"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Deploy trigger failed with status $HTTP_CODE"
            exit 1
          fi

          echo "✅ Deploy triggered successfully"