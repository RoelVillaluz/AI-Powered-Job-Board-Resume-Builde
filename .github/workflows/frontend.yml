name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "shared/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "shared/**"

jobs:
  # ─── Job 1: Build Frontend ─────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build